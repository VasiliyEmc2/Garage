<style>
:root{
  --bg:#131217;
  --surface:#1c1a20;
  --surface-2:#242229;
  --surface-3:#2e2b33;
  --border:#3a3640;
  --border-soft:#28252c;
  --text:#f1ede4;
  --text-dim:#a7a2a8;
  --text-faint:#726d75;
  --accent:#f2a900;
  --accent-ink:#3a2900;
  --income:#8bb339;
  --income-ink:#1c2708;
  --expense:#e2572b;
  --expense-ink:#3a1607;
  --radius:10px;
  --font-display:'Oswald',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body);}
button{font-family:inherit;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--accent);color:var(--accent-ink);}
.icon{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
#app{display:flex;min-height:100vh;}
#sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border-soft);display:flex;flex-direction:column;padding:22px 14px;position:sticky;top:0;height:100vh;}
.brand{padding:0 8px 22px;border-bottom:1px solid var(--border-soft);margin-bottom:18px;}
.brand-name{font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:0.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.brand-sub{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;padding-left:16px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:var(--radius);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;margin-bottom:2px;border:1px solid transparent;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--surface-2);color:var(--text);}
.nav-item.active{background:var(--surface-2);color:var(--accent);border-color:var(--border);}
#main{flex:1;min-width:0;padding:28px 32px 100px;max-width:1120px;}
.page-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px;flex-wrap:wrap;}
.page-title{font-family:var(--font-display);font-size:24px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn:hover{background:var(--surface-3);}
.btn-accent{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);}
.btn-accent:hover{background:#ffb920;}
.btn-ghost{background:none;border-color:transparent;color:var(--text-dim);padding:6px 8px;}
.btn-ghost:hover{background:var(--surface-2);color:var(--text);}
.btn-danger{color:var(--expense);}
input[type=text],input[type=number],input[type=date],input[type=tel],select,textarea{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;}
input[type=number]{-moz-appearance:textfield;appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);}
textarea{resize:vertical;min-height:70px;}
label{display:block;font-size:12px;color:var(--text-dim);margin:0 0 6px;text-transform:uppercase;letter-spacing:0.5px;}
.field{margin-bottom:14px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* Dashboard */
.gauge-panel{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:26px 24px;margin-bottom:24px;display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:18px;}
.gauge{display:flex;flex-direction:column;justify-content:center;}
.gauge-label{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
.gauge-value{font-family:var(--font-mono);font-weight:700;font-variant-numeric:tabular-nums;line-height:1;}
.gauge.big .gauge-value{font-size:44px;color:var(--accent);}
.gauge.income .gauge-value{font-size:26px;color:var(--income);}
.gauge.expense .gauge-value{font-size:26px;color:var(--expense);}
.gauge-sep{width:1px;background:var(--border-soft);}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
.chart-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:20px;}
.chart-card h3{font-family:var(--font-display);font-size:14px;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin:0 0 14px;color:var(--text-dim);}
.legend-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border-soft);}
.legend-row:last-child{border-bottom:none;}
.legend-left{display:flex;align-items:center;gap:8px;color:var(--text-dim);}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.legend-amt{font-family:var(--font-mono);font-weight:600;color:var(--text);}
.recent-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:20px;}
.recent-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-soft);}
.recent-row:last-child{border-bottom:none;}
.recent-badge{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.recent-badge.income{background:var(--income-ink);color:var(--income);}
.recent-badge.expense{background:var(--expense-ink);color:var(--expense);}
.recent-mid{flex:1;min-width:0;}
.recent-title{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.recent-sub{font-size:12px;color:var(--text-faint);}
.recent-amt{font-family:var(--font-mono);font-weight:700;font-size:14px;white-space:nowrap;}
.recent-amt.income{color:var(--income);}
.recent-amt.expense{color:var(--expense);}

/* Clients */
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.toolbar input,.toolbar select{width:auto;flex:1;min-width:160px;}
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
.client-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:16px;cursor:pointer;}
.client-card:hover{border-color:var(--border);}
.client-name{font-family:var(--font-display);font-weight:600;font-size:16px;margin-bottom:4px;}
.client-line{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text-dim);margin-bottom:3px;}
.client-div{border-top:1px solid var(--border-soft);margin:12px 0 10px;}
.client-spent-label{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.5px;}
.client-spent{font-family:var(--font-mono);font-weight:700;font-size:19px;color:var(--accent);}
.client-jobs-count{font-size:11px;color:var(--text-faint);margin-top:2px;}
.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--surface-3);}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-del{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.65);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;line-height:1;padding:0;}
.photo-add{aspect-ratio:1;border:1px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-faint);background:none;flex-direction:column;gap:2px;font-size:10px;text-align:center;}
.photo-add .icon{width:18px;height:18px;}
.photo-add.uploading{opacity:0.5;pointer-events:none;}

/* Tickets (jobs/expenses) */
.ticket-list{display:flex;flex-direction:column;gap:12px;}
.ticket{background:var(--surface);border:1px solid var(--border-soft);border-radius:10px;padding:14px 16px;position:relative;}
.ticket-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.ticket-num{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:0.3px;}
.ticket-date{font-size:12px;color:var(--text-dim);margin-left:auto;}
.ticket-div{border-top:1px dashed var(--border);margin:8px 0;}
.ticket-body{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;}
.ticket-desc{font-size:14.5px;line-height:1.4;}
.ticket-client{font-weight:600;font-family:var(--font-display);font-size:15px;margin-bottom:2px;}
.ticket-amt{font-family:var(--font-mono);font-weight:700;font-size:19px;white-space:nowrap;}
.ticket-actions{display:flex;gap:2px;flex-shrink:0;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-faint);}
.empty-state .icon{width:36px;height:36px;margin-bottom:10px;opacity:0.5;}
.price-tier-switch{display:flex;gap:6px;margin-bottom:12px;}
.price-tier-btn{flex:1;padding:9px 4px;border-radius:8px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-dim);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;cursor:pointer;text-align:center;}
.price-tier-btn.active{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);}
.price-cat-title{font-family:var(--font-display);font-size:12.5px;text-transform:uppercase;letter-spacing:0.8px;color:var(--accent);padding:14px 0 6px;border-bottom:1px solid var(--border-soft);margin-bottom:2px;}
.price-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-soft);}
.price-row-name{font-size:13.5px;line-height:1.35;}
.price-row-note{font-size:11px;color:var(--text-faint);margin-top:2px;}
.price-row-val{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.price-amt{font-family:var(--font-mono);font-weight:700;font-size:14.5px;color:var(--accent);white-space:nowrap;}
.price-use-btn{width:28px;height:28px;border-radius:8px;background:var(--surface-3);border:none;color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;padding:0;}
.price-use-btn:hover{background:var(--accent);color:var(--accent-ink);}

/* Modal */
#overlay{position:fixed;inset:0;background:rgba(10,9,11,0.72);display:none;align-items:flex-end;justify-content:center;z-index:100;}
#overlay.show{display:flex;}
.modal{background:var(--surface-2);width:100%;max-width:460px;border-radius:16px 16px 0 0;padding:22px 22px 26px;max-height:88vh;overflow-y:auto;border:1px solid var(--border);border-bottom:none;}
@media(min-width:640px){#overlay{align-items:center;}.modal{border-radius:16px;border-bottom:1px solid var(--border);}}
.modal-title{font-family:var(--font-display);font-size:19px;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 18px;display:flex;justify-content:space-between;align-items:center;}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.modal-actions .btn{flex:1;justify-content:center;}
.sheet-option{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;cursor:pointer;background:var(--surface);}
.sheet-option:hover{border-color:var(--accent);}
.sheet-option .icon{color:var(--accent);width:22px;height:22px;}
.new-client-box{border:1px dashed var(--border);border-radius:10px;padding:12px;margin:4px 0 14px;}

/* Mobile nav */
#mobilenav{display:none;}
.fab{position:fixed;bottom:24px;right:22px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:var(--accent-ink);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;box-shadow:0 6px 16px rgba(0,0,0,0.4);}
.fab .icon{width:26px;height:26px;stroke-width:2.2;}

@media(max-width:880px){
  #sidebar{display:none;}
  #main{padding:18px 16px 96px;}
  #mobilenav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border-soft);z-index:40;padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
  .mnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:var(--text-faint);background:none;border:none;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;}
  .mnav-item.active{color:var(--accent);}
  .fab{bottom:78px;}
  .gauge-panel{grid-template-columns:1fr;gap:14px;text-align:left;}
  .gauge-sep{display:none;}
  .charts-grid{grid-template-columns:1fr;}
  .field-row{grid-template-columns:1fr;}
}
</style>

function resizeImage(file, maxDim=1600, quality=0.82){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w=img.width, h=img.height;
        if(w>maxDim||h>maxDim){
          if(w>h){h=Math.round(h*maxDim/w);w=maxDim;} else {w=Math.round(w*maxDim/h);h=maxDim;}
        }
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(blob=>blob?resolve(blob):reject(new Error('toBlob failed')), 'image/jpeg', quality);
      };
      img.onerror=reject;
      img.src=e.target.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

async function uploadPhotoBlob(path, file){
  const blob = await resizeImage(file);
  const ref = storageRef.ref().child(path);
  await ref.put(blob, {contentType:'image/jpeg'});
  const url = await ref.getDownloadURL();
  return {url, path};
}
async function uploadClientPhoto(clientId, file){
  return uploadPhotoBlob(`clients/${clientId}/${uid()}.jpg`, file);
}
async function uploadJobPhoto(clientId, jobId, file){
  return uploadPhotoBlob(`clients/${clientId}/jobs/${jobId}/${uid()}.jpg`, file);
}

async function loadAll(){

    seedData();
    showStorageWarning();
    return;
  }
  try{
    const snap = await docRef.get();
    if(snap.exists){
      const d = snap.data();
      clients = d.clients||[]; jobs = d.jobs||[]; expenses = d.expenses||[];
      if(d.priceList && d.priceList.length){
        priceList = d.priceList;
      } else {
        priceList = SEED_PRICE_LIST.map(i=>({id:uid(),...i}));
        await saveAll();
        console.log('[Vasilich Garage] Прайс-лист впервые добавлен в базу');
      }
      console.log('%c[Vasilich Garage] Загружено из Firestore ✓','color:#8bb339;font-weight:bold',{clients:clients.length,jobs:jobs.length,expenses:expenses.length,priceList:priceList.length});
    } else {
      console.log('[Vasilich Garage] В Firestore пока пусто — создаю начальные данные');
      seedData();
      await saveAll();
    }
  }catch(e){
    console.error('[Vasilich Garage] Ошибка загрузки:', e);
    seedData();
    showStorageWarning();
  }
}

function drawCharts(){
  const totalIncome=jobs.reduce((s,j)=>s+Number(j.amount),0);
  const totalExpense=expenses.reduce((s,e)=>s+Number(e.amount),0);
  if(incomeChart){incomeChart.destroy();incomeChart=null;}
  if(expenseChart){expenseChart.destroy();expenseChart=null;}
  const incCanvas=document.getElementById('incomeChart');
  if(incCanvas && totalIncome>0){
    const data=INCOME_CATS.map(c=>jobs.filter(j=>j.category===c).reduce((s,j)=>s+Number(j.amount),0));
    incomeChart=new Chart(incCanvas,{type:'doughnut',data:{labels:INCOME_CATS,datasets:[{data:data,backgroundColor:INCOME_CATS.map((c,i)=>PALETTE[i%PALETTE.length]),borderColor:'#1c1a20',borderWidth:3}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>ctx.label+': '+Math.round(ctx.parsed).toLocaleString('ru-RU')+' \u20BE'}}}}});
  }
  const expCanvas=document.getElementById('expenseChart');
  if(expCanvas && totalExpense>0){
    const data=EXPENSE_CATS.map(c=>expenses.filter(e=>e.category===c).reduce((s,e)=>s+Number(e.amount),0));
    expenseChart=new Chart(expCanvas,{type:'doughnut',data:{labels:EXPENSE_CATS,datasets:[{data:data,backgroundColor:EXPENSE_CATS.map((c,i)=>PALETTE[i%PALETTE.length]),borderColor:'#1c1a20',borderWidth:3}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>ctx.label+': '+Math.round(ctx.parsed).toLocaleString('ru-RU')+' \u20BE'}}}}});
  }
}

function clientCardHTML(c){
  const cjobs=jobs.filter(j=>j.clientId===c.id);
  const spent=cjobs.reduce((s,j)=>s+Number(j.amount),0);
  return `<div class="client-card" data-id="${c.id}">

function pluralJobs(n){
  const m10=n%10, m100=n%100;
  if(m10===1&&m100!==11)return'работа';
  if([2,3,4].includes(m10)&&![12,13,14].includes(m100))return'работы';
  return'работ';
}

/* ---------- MODAL ENGINE ---------- */
function openModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('overlay').classList.add('show');}
function closeModal(){document.getElementById('overlay').classList.remove('show');document.getElementById('modal-body').innerHTML='';}
document.getElementById('overlay').addEventListener('click',(e)=>{if(e.target.id==='overlay')closeModal();});

function confirmDialog(msg){
  return new Promise(resolve=>{
    openModal(`<div class="modal-title">Подтвердите</div><p style="color:var(--text-dim);font-size:14px;">${msg}</p>
    <div class="modal-actions"><button class="btn" id="cf-no">Отмена</button><button class="btn btn-accent" id="cf-yes" style="background:var(--expense);border-color:var(--expense);color:#fff;">Удалить</button></div>`);
    document.getElementById('cf-no').onclick=()=>{closeModal();resolve(false);};
    document.getElementById('cf-yes').onclick=()=>{closeModal();resolve(true);};
  });
}

/* ---------- CLIENT MODAL ---------- */
function openClientModal(id){
  const editing=id?clients.find(c=>c.id===id):null;
  openModal(`<div class="modal-title">${editing?'Изменить клиента':'Новый клиент'}<button class="btn-ghost" id="m-close">${ICONS.close}</button></div>
  <div class="field"><label>Имя</label><input type="text" id="f-name" value="${editing?editing.name:''}" placeholder="Иванов Сергей"></div>
  <div class="field"><label>Контакт</label><input type="text" id="f-contact" value="${editing?editing.contact:''}" placeholder="Телефон, telegram"></div>
  <div class="field"><label>Мотоцикл</label><input type="text" id="f-moto" value="${editing?editing.moto:''}" placeholder="Honda CB400"></div>
  <div class="field"><label>Заметки</label><textarea id="f-notes" placeholder="Особенности, договорённости">${editing?editing.notes||'':''}</textarea></div>
  <div class="modal-actions"><button class="btn" id="c-cancel">Отмена</button><button class="btn btn-accent" id="c-save">Сохранить</button></div>`);
  document.getElementById('m-close').onclick=closeModal;
  document.getElementById('c-cancel').onclick=closeModal;
  document.getElementById('c-save').onclick=async()=>{
    const name=document.getElementById('f-name').value.trim();
    if(!name){document.getElementById('f-name').style.borderColor='var(--expense)';return;}
    const data={name,contact:document.getElementById('f-contact').value.trim(),moto:document.getElementById('f-moto').value.trim(),notes:document.getElementById('f-notes').value.trim(),photos:editing?(editing.photos||[]):[]};
    if(editing) Object.assign(editing,data); else clients.push({id:uid(),...data});
    await saveClients();closeModal();renderView();
  };
}
function openClientDetail(id){
  const c=clients.find(x=>x.id===id);if(!c)return;
  if(!c.photos) c.photos=[];
  const cjobs=jobs.filter(j=>j.clientId===c.id).sort((a,b)=>b.date.localeCompare(a.date));
  const spent=cjobs.reduce((s,j)=>s+Number(j.amount),0);
  openModal(`<div class="modal-title">${c.name}<button class="btn-ghost" id="m-close">${ICONS.close}</button></div>
  ${c.moto?`<div class="client-line" style="margin-bottom:6px;">${ICONS.moto}${c.moto}</div>`:''}
  ${c.contact?`<div class="client-line" style="margin-bottom:6px;">${ICONS.phone}${c.contact}</div>`:''}
  ${c.notes?`<div style="font-size:13px;color:var(--text-dim);margin-bottom:10px;">${c.notes}</div>`:''}
  <div class="client-div"></div>
  <div class="client-spent-label">Всего потрачено</div>
  <div class="client-spent" style="margin-bottom:14px;">${money(spent)}</div>
  <div style="font-size:12px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Фото мотоцикла</div>
  <div class="photo-grid" id="photo-grid">
    ${c.photos.map((p,i)=>`<div class="photo-thumb"><img src="${p.url}" loading="lazy"><button class="btn-ghost photo-del" data-i="${i}">${ICONS.close}</button></div>`).join('')}
    <label class="photo-add" id="photo-add-btn">${ICONS.plus}<span>Фото</span><input type="file" accept="image/*" multiple id="photo-input" style="display:none;"></label>
  </div>
  <div style="font-size:12px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">История работ</div>
  <div style="max-height:280px;overflow-y:auto;margin-bottom:16px;">
  ${cjobs.length?cjobs.map(j=>`
    <div style="padding:8px 0;border-bottom:1px solid var(--border-soft);">
      <div style="display:flex;justify-content:space-between;font-size:13px;gap:8px;">
        <span style="color:var(--text-dim)">${fmtDate(j.date)} · ${j.description||j.category}</span>
        <span style="font-family:var(--font-mono);font-weight:600;white-space:nowrap;">${money(j.amount)}</span>
      </div>
      ${j.photos&&j.photos.length?`<div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;">${j.photos.map(p=>`<img src="${p.url}" loading="lazy" style="width:46px;height:46px;object-fit:cover;border-radius:6px;cursor:pointer;" onclick="window.open('${p.url}','_blank')">`).join('')}</div>`:''}
    </div>`).join(''):'<div style="color:var(--text-faint);font-size:13px;">Пока нет работ</div>'}
  </div>
  <div class="modal-actions"><button class="btn" id="c-edit">${ICONS.edit}Изменить</button><button class="btn" id="c-del" style="color:var(--expense);">${ICONS.trash}Удалить</button></div>`);
  document.getElementById('m-close').onclick=closeModal;
  document.getElementById('c-edit').onclick=()=>openClientModal(c.id);
  document.querySelectorAll('.photo-del').forEach(b=>b.onclick=async(ev)=>{
    ev.preventDefault();ev.stopPropagation();
    const i=Number(b.dataset.i);
    const photo=c.photos[i];
    if(!(await confirmDialog('Удалить это фото?')))return;
    c.photos.splice(i,1);
    await saveClients();
    if(photo&&photo.path) deleteClientPhoto(photo.path);
    openClientDetail(c.id);
  });
  const photoInput=document.getElementById('photo-input');
  photoInput.onchange=async()=>{
    const files=Array.from(photoInput.files||[]);
    if(!files.length)return;
    if(!firebaseReady){alert('Хранилище не подключено, фото сохранить нельзя.');return;}
    const addBtn=document.getElementById('photo-add-btn');
    addBtn.classList.add('uploading');
    addBtn.querySelector('span').textContent='Загрузка...';
    for(const file of files){
      try{
        const {url,path}=await uploadClientPhoto(c.id,file);
        c.photos.push({url,path});
      }catch(e){
        console.error('[Vasilich Garage] Ошибка загрузки фото:', e);
        alert('Не удалось загрузить фото: '+(e.message||e));
      }
    }
    await saveClients();
    openClientDetail(c.id);
  };
  document.getElementById('c-del').onclick=async()=>{
    const msg=cjobs.length?`У клиента ${cjobs.length} ${pluralJobs(cjobs.length)}. Удалить клиента и всю историю работ?`:'Удалить этого клиента?';
    if(await confirmDialog(msg)){
      clients=clients.filter(x=>x.id!==c.id);
      jobs=jobs.filter(j=>j.clientId!==c.id);
      (c.photos||[]).forEach(p=>{if(p.path)deleteClientPhoto(p.path);});
      cjobs.forEach(j=>{(j.photos||[]).forEach(p=>{if(p.path)deleteClientPhoto(p.path);});});
      await saveClients();await saveJobs();closeModal();renderView();
    }
  };
}

/* ---------- JOB MODAL ---------- */
function openJobModal(id, prefill){
  const editing=id?jobs.find(j=>j.id===id):null;
  const existingPhotos = editing ? (editing.photos||[]) : [];
  const pendingPhotos = [];
  const clientOptions=clients.map(c=>`<option value="${c.id}" ${editing&&editing.clientId===c.id?'selected':''}>${c.name}</option>`).join('');
  const preDesc = editing ? (editing.description||'') : ((prefill&&prefill.description)||'');
  const preAmount = editing ? editing.amount : ((prefill&&prefill.amount!==undefined)?prefill.amount:'');
  openModal(`<div class="modal-title">${editing?'Изменить работу':'Новая работа'}<button class="btn-ghost" id="m-close">${ICONS.close}</button></div>
  <div class="field"><label>Клиент</label>
    <select id="f-client"><option value="">— выбрать —</option>${clientOptions}<option value="__new__">+ Новый клиент</option></select>
  </div>
  <div class="new-client-box" id="new-client-box" style="display:none;">
    <div class="field"><label>Имя нового клиента</label><input type="text" id="f-newname" placeholder="Иванов Сергей"></div>
    <div class="field" style="margin-bottom:0;"><label>Мотоцикл</label><input type="text" id="f-newmoto" placeholder="Необязательно"></div>
  </div>
  <div class="field-row">
    <div class="field"><label>Дата</label><input type="date" id="f-date" value="${editing?editing.date:todayISO()}"></div>
    <div class="field"><label>Категория</label><select id="f-cat">${INCOME_CATS.map(c=>`<option ${editing&&editing.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
  </div>
  <div class="field"><label>Описание работы</label><textarea id="f-desc" placeholder="Замена масла, ремонт карбюратора...">${preDesc}</textarea></div>
  <div class="field"><label>Сумма, \u20BE</label><input type="number" id="f-amount" min="0" step="1" value="${preAmount}" placeholder="0"></div>
  <div class="field"><label>Фото работы</label><div class="photo-grid" id="job-photo-grid"></div></div>
  <div class="modal-actions"><button class="btn" id="j-cancel">Отмена</button><button class="btn btn-accent" id="j-save">Сохранить</button></div>`);

  function renderJobPhotoGrid(){
    const grid=document.getElementById('job-photo-grid');
    if(!grid)return;
    let html='';
    existingPhotos.forEach((p,i)=>{
      html+=`<div class="photo-thumb"><img src="${p.url}" loading="lazy"><button class="btn-ghost photo-del" data-kind="existing" data-i="${i}">${ICONS.close}</button></div>`;
    });
    pendingPhotos.forEach((f,i)=>{
      html+=`<div class="photo-thumb"><img src="${URL.createObjectURL(f)}"><button class="btn-ghost photo-del" data-kind="pending" data-i="${i}">${ICONS.close}</button></div>`;
    });
    html+=`<label class="photo-add" id="job-photo-add-btn">${ICONS.plus}<span>Фото</span><input type="file" accept="image/*" multiple id="job-photo-input" style="display:none;"></label>`;
    grid.innerHTML=html;
    document.getElementById('job-photo-input').onchange=(e)=>{
      pendingPhotos.push(...Array.from(e.target.files||[]));
      renderJobPhotoGrid();
    };
    grid.querySelectorAll('.photo-del').forEach(b=>b.onclick=async(ev)=>{
      ev.preventDefault();ev.stopPropagation();
      const i=Number(b.dataset.i);
      if(b.dataset.kind==='pending'){
        pendingPhotos.splice(i,1);
        renderJobPhotoGrid();
      }else{
        if(!(await confirmDialog('Удалить это фото?')))return;
        const photo=existingPhotos[i];
        existingPhotos.splice(i,1);
        if(editing) await saveJobs();
        if(photo&&photo.path) deleteClientPhoto(photo.path);
        renderJobPhotoGrid();
      }
    });
  }
  renderJobPhotoGrid();

  document.getElementById('m-close').onclick=closeModal;
  document.getElementById('j-cancel').onclick=closeModal;
  document.getElementById('f-client').onchange=(e)=>{document.getElementById('new-client-box').style.display=e.target.value==='__new__'?'block':'none';};
  document.getElementById('j-save').onclick=async()=>{
    let clientId=document.getElementById('f-client').value;
    const amount=Number(document.getElementById('f-amount').value);
    if(!amount||amount<=0){document.getElementById('f-amount').style.borderColor='var(--expense)';return;}
    if(clientId==='__new__'){
      const newName=document.getElementById('f-newname').value.trim();
      if(!newName){document.getElementById('f-newname').style.borderColor='var(--expense)';return;}
      const newClient={id:uid(),name:newName,contact:'',moto:document.getElementById('f-newmoto').value.trim(),notes:'',photos:[]};
      clients.push(newClient);await saveClients();clientId=newClient.id;
    }
    if(!clientId){document.getElementById('f-client').style.borderColor='var(--expense)';return;}
    const jobId = editing ? editing.id : uid();
    const saveBtn=document.getElementById('j-save');
    if(pendingPhotos.length && !firebaseReady){alert('Хранилище не подключено, фото сохранить нельзя.');return;}
    saveBtn.disabled=true;
    const origText=saveBtn.textContent;
    if(pendingPhotos.length) saveBtn.textContent='Загрузка фото...';
    try{
      for(const file of pendingPhotos){
        const {url,path}=await uploadJobPhoto(clientId,jobId,file);
        existingPhotos.push({url,path});
      }
    }catch(e){
      console.error('[Vasilich Garage] Ошибка загрузки фото работы:', e);
      alert('Не удалось загрузить одно или несколько фото: '+(e.message||e));
    }
    const data={clientId,date:document.getElementById('f-date').value||todayISO(),category:document.getElementById('f-cat').value,description:document.getElementById('f-desc').value.trim(),amount,photos:existingPhotos};
    if(editing) Object.assign(editing,data); else jobs.push({id:jobId,...data});
    await saveJobs();
    saveBtn.disabled=false;saveBtn.textContent=origText;
    closeModal();renderView();
  };
}

/* ---------- EXPENSE MODAL ---------- */
/* ---------- ПРАЙС-ЛИСТ: МОДАЛКА ---------- */
let priceListTier = localStorage.getItem('vg_price_tier') || 'm';
let priceListSearch = '';

function priceValueFor(item){ return item[priceListTier]; }
function priceDisplay(item){
  if(item.special==='free') return 'Бесплатно';
  if(item.special==='negotiable') return 'Договорная';
  if(item.special==='hourly') return 'Почасово';
  const v=priceValueFor(item);
  return (v===null||v===undefined) ? '—' : money(v);
}

function openPriceListModal(){
  openModal(`<div class="modal-title">Прайс-лист<button class="btn-ghost" id="m-close">${ICONS.close}</button></div>
  <div class="price-tier-switch" id="price-tier-switch">
    <button class="price-tier-btn" data-t="l">Лёгкий</button>
    <button class="price-tier-btn" data-t="m">Средний</button>
    <button class="price-tier-btn" data-t="h">Тяжёлый</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:2px;">
    <input type="text" id="price-search" placeholder="Поиск услуги...">
    <button class="btn btn-ghost" id="btn-add-price" style="flex-shrink:0;border:1px solid var(--border);" title="Добавить позицию">${ICONS.plus}</button>
  </div>
  <div id="price-list-body" style="max-height:50vh;overflow-y:auto;margin-top:10px;"></div>`);
  document.getElementById('m-close').onclick=closeModal;
  document.getElementById('price-search').oninput=(e)=>{priceListSearch=e.target.value;renderPriceListBody();};
  document.getElementById('btn-add-price').onclick=()=>openPriceItemModal();
  document.querySelectorAll('.price-tier-btn').forEach(b=>b.onclick=()=>{
    priceListTier=b.dataset.t;
    localStorage.setItem('vg_price_tier', priceListTier);
    renderPriceTierButtons();renderPriceListBody();
  });
  renderPriceTierButtons();
  renderPriceListBody();
}
function renderPriceTierButtons(){
  document.querySelectorAll('.price-tier-btn').forEach(b=>b.classList.toggle('active', b.dataset.t===priceListTier));
}
function renderPriceListBody(){
  const body=document.getElementById('price-list-body');
  if(!body)return;
  const q=priceListSearch.trim().toLowerCase();
  const cats=[...new Set(priceList.map(i=>i.cat))];
  let html='';
  cats.forEach(cat=>{
    const rows=priceList.filter(i=>i.cat===cat && (!q || i.name.toLowerCase().includes(q)));
    if(!rows.length) return;
    html+=`<div class="price-cat-title">${cat}</div>`;
    rows.forEach(item=>{
      html+=`<div class="price-row">
        <div class="price-row-edit" data-id="${item.id}" style="cursor:pointer;flex:1;min-width:0;"><div class="price-row-name">${item.name}</div>${item.note?`<div class="price-row-note">${item.note}</div>`:''}</div>
        <div class="price-row-val"><span class="price-amt">${priceDisplay(item)}</span><button class="btn-ghost price-use-btn" data-id="${item.id}" title="Добавить в работу">${ICONS.plus}</button></div>
      </div>`;
    });
  });
  body.innerHTML = html || `<div class="empty-state" style="padding:30px 0;">Ничего не найдено</div>`;
  body.querySelectorAll('.price-row-edit').forEach(el=>el.onclick=()=>openPriceItemModal(el.dataset.id));
  body.querySelectorAll('.price-use-btn').forEach(b=>b.onclick=(ev)=>{
    ev.stopPropagation();
    const item=priceList.find(p=>p.id===b.dataset.id);
    const val=priceValueFor(item);
    closeModal();
    openJobModal(null, {description:item.name, amount:(val===null||val===undefined)?'':val});
  });
}

function openPriceItemModal(id){
  const editing = id ? priceList.find(p=>p.id===id) : null;
  const categories=[...new Set(priceList.map(p=>p.cat))];
  const val=(v)=>(v===null||v===undefined)?'':v;
  openModal(`<div class="modal-title">${editing?'Изменить позицию':'Новая позиция'}<button class="btn-ghost" id="m-close">${ICONS.close}</button></div>
  <div class="field"><label>Категория</label><input type="text" id="pi-cat" list="pi-cat-list" value="${editing?editing.cat:''}" placeholder="Например: ДВС"></div>
  <datalist id="pi-cat-list">${categories.map(c=>`<option value="${c}">`).join('')}</datalist>
  <div class="field"><label>Название услуги</label><input type="text" id="pi-name" value="${editing?editing.name:''}" placeholder="Замена масла с фильтром"></div>
  <div class="field"><label>Тип цены</label>
    <select id="pi-special">
      <option value="" ${!editing||!editing.special?'selected':''}>Обычная цена</option>
      <option value="free" ${editing&&editing.special==='free'?'selected':''}>Бесплатно</option>
      <option value="negotiable" ${editing&&editing.special==='negotiable'?'selected':''}>Договорная</option>
      <option value="hourly" ${editing&&editing.special==='hourly'?'selected':''}>Почасовая</option>
    </select>
  </div>
  <div id="pi-price-fields">
    <div class="field-row">
      <div class="field"><label>Лёгкий, \u20BE</label><input type="number" id="pi-l" value="${editing?val(editing.l):''}" placeholder="0"></div>
      <div class="field"><label>Средний, \u20BE</label><input type="number" id="pi-m" value="${editing?val(editing.m):''}" placeholder="0"></div>
    </div>
    <div class="field"><label>Тяжёлый, \u20BE</label><input type="number" id="pi-h" value="${editing?val(editing.h):''}" placeholder="0"></div>
  </div>
  <div class="field"><label>Примечание (необязательно)</label><input type="text" id="pi-note" value="${editing&&editing.note?editing.note:''}" placeholder="Например: 1 цил. / 2-4 цил."></div>
  <div class="modal-actions">
    ${editing?`<button class="btn" id="pi-del" style="color:var(--expense);flex:0;">${ICONS.trash}</button>`:''}
    <button class="btn" id="pi-cancel">Отмена</button>
    <button class="btn btn-accent" id="pi-save">Сохранить</button>
  </div>`);
  document.getElementById('m-close').onclick=closeModal;
  document.getElementById('pi-cancel').onclick=closeModal;
  function toggleFields(){
    const special=document.getElementById('pi-special').value;
    document.getElementById('pi-price-fields').style.display = special ? 'none' : 'block';
  }
  document.getElementById('pi-special').onchange=toggleFields;
  toggleFields();
  if(editing){
    document.getElementById('pi-del').onclick=async()=>{
      if(await confirmDialog(`Удалить позицию «${editing.name}» из прайса?`)){
        priceList=priceList.filter(p=>p.id!==editing.id);
        await savePriceList();
        openPriceListModal();
      }
    };
  }
  document.getElementById('pi-save').onclick=async()=>{
    const cat=document.getElementById('pi-cat').value.trim();
    const name=document.getElementById('pi-name').value.trim();
    if(!cat){document.getElementById('pi-cat').style.borderColor='var(--expense)';return;}
    if(!name){document.getElementById('pi-name').style.borderColor='var(--expense)';return;}
    const special=document.getElementById('pi-special').value||null;
    let l=null,m=null,h=null;
    if(!special){
      const lv=document.getElementById('pi-l').value, mv=document.getElementById('pi-m').value, hv=document.getElementById('pi-h').value;
      l=lv===''?null:Number(lv); m=mv===''?null:Number(mv); h=hv===''?null:Number(hv);
    } else if(special==='free'){ l=0;m=0;h=0; }
    const note=document.getElementById('pi-note').value.trim()||null;
    const data={cat,name,l,m,h,note,special};
    if(editing) Object.assign(editing,data); else priceList.push({id:uid(),...data});
    await savePriceList();
    openPriceListModal();
  };
}

function openExpenseModal(id){
  const editing=id?expenses.find(e=>e.id===id):null;
  openModal(`<div class="modal-title">${editing?'Изменить расход':'Новый расход'}<button class="btn-ghost" id="m-close">${ICONS.close}</button></div>
  <div class="field-row">
    <div class="field"><label>Дата</label><input type="date" id="f-date" value="${editing?editing.date:todayISO()}"></div>
    <div class="field"><label>Категория</label><select id="f-cat">${EXPENSE_CATS.map(c=>`<option ${editing&&editing.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
  </div>
  <div class="field"><label>Описание</label><input type="text" id="f-desc" value="${editing?editing.description||'':''}" placeholder="Что купили / за что платили"></div>
  <div class="field"><label>Сумма, \u20BE</label><input type="number" id="f-amount" min="0" step="1" value="${editing?editing.amount:''}" placeholder="0"></div>
  <div class="modal-actions"><button class="btn" id="e-cancel">Отмена</button><button class="btn btn-accent" id="e-save">Сохранить</button></div>`);
  document.getElementById('m-close').onclick=closeModal;
  document.getElementById('e-cancel').onclick=closeModal;
  document.getElementById('e-save').onclick=async()=>{
    const amount=Number(document.getElementById('f-amount').value);
    if(!amount||amount<=0){document.getElementById('f-amount').style.borderColor='var(--expense)';return;}
    const data={date:document.getElementById('f-date').value||todayISO(),category:document.getElementById('f-cat').value,description:document.getElementById('f-desc').value.trim(),amount};
    if(editing) Object.assign(editing,data); else expenses.push({id:uid(),...data});
    await saveExpenses();closeModal();renderView();
  };
}

/* ---------- ЭКРАН ВХОДА ---------- */
const APP_PASSWORD = "garage2026"; // ← поменяйте на свой пароль
function isUnlocked(){ return localStorage.getItem('vg_unlocked_v1')==='yes'; }
function unlock(){ localStorage.setItem('vg_unlocked_v1','yes'); }

async function startApp(){
  document.getElementById('lock-screen').style.display='none';
  await loadAll();
  renderNav();
  renderView();
}

function initLock(){
  if(isUnlocked()){ startApp(); return; }
  const screen=document.getElementById('lock-screen');
  const input=document.getElementById('lock-input');
  const err=document.getElementById('lock-error');
  screen.style.display='flex';
  input.focus();
  function attempt(){
    if(input.value===APP_PASSWORD){ unlock(); startApp(); }
    else{ err.style.display='block'; input.value=''; input.focus(); }
  }
  document.getElementById('lock-btn').onclick=attempt;
  input.onkeydown=(e)=>{ if(e.key==='Enter') attempt(); };
}

/* ---------- INIT ---------- */
initLock();
</script>
